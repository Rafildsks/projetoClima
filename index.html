<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de clima</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body class="bg-[url('./assets/ceuazul.jpg')] bg-cover flex justify-center items-center h-screen object-cover">
    <main class="bg-blue-950/70 p-10 rounded-2xl">
        <h1 class="text-white text-3xl font-semibold">Pesquisa de clima</h1>
        <form class="flex flex-col items-end" onsubmit="fetchWeather(event)">
            <input id="cidade" name="cidade"
                class="focus-outline-blue-700 focus:outline-2 w-full rounded-md p-1.5 bg-gray-700 placeholder:text-gray-400 text-gray-400 my-5"
                type="text" aria-label="cidade" placeholder="Digite uma cidade">
            <button class="bg-blue-800 px-4 py-1.5 rounded-md text-white cursor-pointer hover:bg-blue-800"
                type="submit">Pesquisar</button>
        </form>
        <section id="resultado"></section>
    </main>
    <script src="index.js"></script>
</body>

</html>
