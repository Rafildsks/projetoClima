<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Clima</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body class="bg-[url('./assets/ceuazul.jpg')] bg-cover flex justify-center items-center h-screen">
    <main class="bg-blue-950/70 p-10 rounded-2xl">
        <h1 class="text-white text-3xl font-semibold">Pesquisa de Clima</h1>
        <section id="resultado">
            <form class="flex flex-col items-end" onsubmit="fetchWeather(event)">
                <input id="cidade" name="cidade"
                    class="focus:outline-blue-700 focus:outline-2 w-full rounded-md bg-gray-700 placeholder:text-gray-400 text-gray-400 p-1.5 my-5"
                    type="text" aria-label="Cidade" placeholder="Digite uma cidade">
                <button type="submit"
                    class="bg-blue-700 px-4 py-1.5 text-white rounded-md cursor-pointer hover:bg-blue-800">Pesquisar</button>
            </form>
        </section>
    </main>
    <script src="index.js"></script>
</body>

</html>
